##
# 123Solar nginx configuration
##
server {
        listen 80;
        listen [::]:80;
        server_name _;
        root /var/www/html;
        index index.php index.htm index.html;

        ##
        # Only allow these request methods
        ##
        if ($request_method !~ ^(GET|HEAD|POST)$ ) {
                return 444;
        }

        ##
        # HTTP Authentication for 123Solar admin panel.
        # satisfy any + allow all means:
        #   - Before first-run setup: .htpasswd does not exist, nginx falls back
        #     to allow all so the setup wizard can be completed.
        #   - After first-run setup: .htpasswd is created by 123solar, valid
        #     credentials are required to access the admin panel.
        ##
        location /123solar/admin {
                index index.php;
                satisfy any;
                auth_basic           "Restricted";
                auth_basic_user_file /var/www/html/123solar/config/.htpasswd;
                allow all;
        }

        ##
        # Pass PHP scripts to FastCGI server via PHP-FPM Unix socket.
        # 'php-fpm' is replaced by the install script with the versioned
        # service name e.g. php8.3-fpm.
        ##
        location ~ \.php$ {
                include snippets/fastcgi-php.conf;
                fastcgi_pass unix:/var/run/php/php-fpm.sock;
        }

        ##
        # Deny access to .ht* files (.htaccess, .htpasswd, etc)
        ##
        location ~ /\.ht {
                deny all;
        }
}
